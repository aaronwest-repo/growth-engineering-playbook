name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skeleton:
    name: Skeleton sanity checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f README.md
          test -f CLAUDE.md

      - name: Verify no .env files are committed
        run: |
          if git ls-files --error-unmatch '.env' '.env.*' 2>/dev/null; then
            echo "Error: .env files must not be committed."
            exit 1
          fi
          echo "No committed .env files found."

      - name: Run skeleton check script
        run: bash scripts/check-skeleton.sh

  shared-data:
    name: Shared-data validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify shared-data is regenerable and unchanged
        run: |
          python scripts/generate-shared-data.py
          if ! git diff --quiet -- shared-data/; then
            echo "Error: committed shared-data differs from generator output."
            echo "Run 'python scripts/generate-shared-data.py' and commit the result."
            git --no-pager diff --stat -- shared-data/
            exit 1
          fi
          echo "Committed shared-data matches the deterministic generator."

      - name: Validate shared-data
        run: python scripts/validate-shared-data.py

  ab-test-analyzer:
    name: 01-ab-test-analyzer smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run statistics smoke test
        working-directory: 01-ab-test-analyzer
        run: node tests/stats.test.mjs

  utm-audit-dashboard:
    name: 02-utm-audit-dashboard smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run UTM audit smoke test
        working-directory: 02-utm-audit-dashboard
        run: node tests/audit.test.mjs

  product-data-cleaner:
    name: 03-product-data-cleaner smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
